name: Update tournament results

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      results_source_url:
        description: "Optional result feed URL. Defaults to FIFA's public World Cup 2026 calendar API."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Refresh generated tournament data
        run: npm run update-results
        env:
          RESULTS_SOURCE_URL: ${{ inputs.results_source_url || secrets.RESULTS_SOURCE_URL || vars.RESULTS_SOURCE_URL || 'https://api.fifa.com/api/v3/calendar/matches?language=en&count=200&idCompetition=17&idSeason=285023' }}
          RESULTS_SOURCE_NAME: ${{ vars.RESULTS_SOURCE_NAME || 'FIFA World Cup 2026 match calendar API' }}
          RESULTS_SOURCE_NOTES: ${{ vars.RESULTS_SOURCE_NOTES || 'Official FIFA calendar endpoint used by scheduled result refresh.' }}
          RESULTS_SOURCE_TOKEN: ${{ secrets.RESULTS_SOURCE_TOKEN }}
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
      - name: Refresh generated tournament stats
        run: npm run update-stats
        env:
          STATS_SOURCE_URL: ${{ vars.STATS_SOURCE_URL || 'https://api.football-data.org/v4/competitions/WC/scorers?season=2026&limit=100' }}
          STATS_SOURCE_NAME: ${{ vars.STATS_SOURCE_NAME || 'football-data.org World Cup scorers API' }}
          STATS_SOURCE_NOTES: ${{ vars.STATS_SOURCE_NOTES || 'football-data.org scorers endpoint normalized into static tournament stat leaderboards.' }}
          STATS_SOURCE_TOKEN: ${{ secrets.STATS_SOURCE_TOKEN }}
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
      - name: Check for data changes
        id: changes
        run: |
          if git diff --quiet -- src/data/tournament.generated.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Test changed data
        if: steps.changes.outputs.changed == 'true'
        run: npm test
      - name: Typecheck changed data
        if: steps.changes.outputs.changed == 'true'
        run: npm run typecheck
      - name: Build changed data
        if: steps.changes.outputs.changed == 'true'
        run: npm run build
      - name: Verify Cloudflare Pages artifact
        if: steps.changes.outputs.changed == 'true'
        run: |
          test -f dist/index.html
          ! grep -q "src/main.ts" dist/index.html
          grep -q "assets/index-" dist/index.html
      - name: Index scenario vectors
        if: steps.changes.outputs.changed == 'true'
        run: npm run index-scenarios
        env:
          SCENARIO_INDEX_URL: ${{ secrets.SCENARIO_INDEX_URL || vars.SCENARIO_INDEX_URL }}
          SCENARIO_SITE_URL: ${{ vars.SCENARIO_SITE_URL || 'https://worldcup2026.pages.dev' }}
          SCENARIO_INDEX_TOKEN: ${{ secrets.SCENARIO_INDEX_TOKEN }}
      - name: Commit generated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/tournament.generated.json
          git commit -m "chore(data): update tournament results"
          git push
      - name: Deploy changed data to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        run: npx wrangler pages deploy dist --project-name worldcup2026 --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
