name: Update tournament results

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Refresh generated tournament data
        run: npm run update-results
        env:
          RESULTS_SOURCE_URL: ${{ secrets.RESULTS_SOURCE_URL || vars.RESULTS_SOURCE_URL }}
          RESULTS_SOURCE_NAME: ${{ vars.RESULTS_SOURCE_NAME }}
          RESULTS_SOURCE_NOTES: ${{ vars.RESULTS_SOURCE_NOTES }}
      - name: Check for data changes
        id: changes
        run: |
          if git diff --quiet -- src/data/tournament.generated.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Test changed data
        if: steps.changes.outputs.changed == 'true'
        run: npm test
      - name: Typecheck changed data
        if: steps.changes.outputs.changed == 'true'
        run: npm run typecheck
      - name: Build changed data
        if: steps.changes.outputs.changed == 'true'
        run: npm run build
      - name: Verify Cloudflare Pages artifact
        if: steps.changes.outputs.changed == 'true'
        run: |
          test -f dist/index.html
          ! grep -q "src/main.ts" dist/index.html
          grep -q "assets/index-" dist/index.html
      - name: Commit generated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/tournament.generated.json
          git commit -m "chore(data): update tournament results"
          git push
      - name: Deploy changed data to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        run: npx wrangler pages deploy dist --project-name worldcup2026 --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
